<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Camera — Thread Map</title>
<style>
:root {
  --bg:#f6f8fa; --text:#24292f; --dim:#57606a; --surf:#fff; --bdr:#d0d7de;
  --main:#0969da; --main-bg:#ddf4ff; --main-bdr:#9ecbff;
  --wat:#9a6700;  --wat-bg:#fff8c5;  --wat-bdr:#f0c434;
  --ffm:#1a7f37;  --ffm-bg:#dafbe1;  --ffm-bdr:#56d364;
  --tg:#6639ba;   --tg-bg:#fbefff;   --tg-bdr:#bf8ff8;
  --ll:#d0d7de; --arr:#8c959f;
  --ph1:rgba(9,105,218,.05); --ph2:rgba(154,103,0,.05);
  --ph3:rgba(26,127,55,.05); --ph4:rgba(102,57,186,.05);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1117; --text:#e6edf3; --dim:#8b949e; --surf:#161b22; --bdr:#30363d;
  --main:#58a6ff; --main-bg:#0c1d3a; --main-bdr:#1f4e8c;
  --wat:#e3b341;  --wat-bg:#211a00;  --wat-bdr:#7a5500;
  --ffm:#56d364;  --ffm-bg:#0a1f0e;  --ffm-bdr:#1e5c2a;
  --tg:#d2a8ff;   --tg-bg:#1b0a3d;   --tg-bdr:#5e2fa0;
  --ll:#21262d; --arr:#6e7681;
  --ph1:rgba(88,166,255,.07); --ph2:rgba(227,179,65,.07);
  --ph3:rgba(86,211,100,.07); --ph4:rgba(210,168,255,.07);
}}
:root[data-theme="light"]{
  --bg:#f6f8fa; --text:#24292f; --dim:#57606a; --surf:#fff; --bdr:#d0d7de;
  --main:#0969da; --main-bg:#ddf4ff; --main-bdr:#9ecbff;
  --wat:#9a6700;  --wat-bg:#fff8c5;  --wat-bdr:#f0c434;
  --ffm:#1a7f37;  --ffm-bg:#dafbe1;  --ffm-bdr:#56d364;
  --tg:#6639ba;   --tg-bg:#fbefff;   --tg-bdr:#bf8ff8;
  --ll:#d0d7de; --arr:#8c959f;
  --ph1:rgba(9,105,218,.05); --ph2:rgba(154,103,0,.05);
  --ph3:rgba(26,127,55,.05); --ph4:rgba(102,57,186,.05);
}
:root[data-theme="dark"]{
  --bg:#0d1117; --text:#e6edf3; --dim:#8b949e; --surf:#161b22; --bdr:#30363d;
  --main:#58a6ff; --main-bg:#0c1d3a; --main-bdr:#1f4e8c;
  --wat:#e3b341;  --wat-bg:#211a00;  --wat-bdr:#7a5500;
  --ffm:#56d364;  --ffm-bg:#0a1f0e;  --ffm-bdr:#1e5c2a;
  --tg:#d2a8ff;   --tg-bg:#1b0a3d;   --tg-bdr:#5e2fa0;
  --ll:#21262d; --arr:#6e7681;
  --ph1:rgba(88,166,255,.07); --ph2:rgba(227,179,65,.07);
  --ph3:rgba(86,211,100,.07); --ph4:rgba(210,168,255,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:24px 16px 48px}
h1{font-size:1.05rem;font-weight:600;margin-bottom:3px}
.sub{font-size:.78rem;color:var(--dim);margin-bottom:18px}
.wrap{overflow-x:auto}
svg{display:block;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
</style>
</head>
<body>

<div class="hd">
  <h1>PI Camera — Thread Map</h1>
  <p class="sub">How the four concurrent threads communicate across a recording lifecycle</p>
</div>

<div class="wrap">
<svg viewBox="0 0 900 855" width="900" height="855" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 8 7" refX="7" refY="3.5"
          markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="var(--arr)"/>
  </marker>
</defs>

<!-- ── Phase bands ── -->
<rect x="0"   y="73"  width="900" height="202" fill="var(--ph1)" rx="0"/>
<rect x="0"   y="287" width="900" height="188" fill="var(--ph2)" rx="0"/>
<rect x="0"   y="487" width="900" height="158" fill="var(--ph3)" rx="0"/>
<rect x="0"   y="657" width="900" height="175" fill="var(--ph4)" rx="0"/>

<!-- ── Phase labels (left rail) ── -->
<text x="8" y="93"  font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--main)" opacity=".75">① MOTION DETECTED</text>
<text x="8" y="307" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--wat)"  opacity=".75">② WATCHDOG FIRES</text>
<text x="8" y="507" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--ffm)"  opacity=".75">③ FFMPEG CONVERSION</text>
<text x="8" y="677" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--tg)"   opacity=".75">④ MOTION ENDS</text>

<!-- ══════════════════════════════════════════
     ACTOR HEADER BOXES
     cx: Main=125  Watchdog=330  ffmpeg=545  Telegram=760
═══════════════════════════════════════════ -->

<!-- Main Loop -->
<rect x="50"  y="10" width="150" height="54" rx="6" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5"/>
<text x="125" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--main)">Main Loop</text>
<text x="125" y="47" text-anchor="middle" font-size="10"   fill="var(--main)" opacity=".7">main thread · always running</text>

<!-- Watchdog Timer -->
<rect x="255" y="10" width="150" height="54" rx="6" fill="var(--wat-bg)" stroke="var(--wat)" stroke-width="1.5"/>
<text x="330" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--wat)">Watchdog Timer</text>
<text x="330" y="47" text-anchor="middle" font-size="10"   fill="var(--wat)" opacity=".7">threading.Timer · daemon</text>

<!-- ffmpeg Thread -->
<rect x="470" y="10" width="150" height="54" rx="6" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5"/>
<text x="545" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--ffm)">ffmpeg Thread</text>
<text x="545" y="47" text-anchor="middle" font-size="10"   fill="var(--ffm)" opacity=".7">threading.Thread · per clip</text>

<!-- Telegram Thread -->
<rect x="685" y="10" width="150" height="54" rx="6" fill="var(--tg-bg)" stroke="var(--tg)" stroke-width="1.5"/>
<text x="760" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--tg)">Telegram Thread</text>
<text x="760" y="47" text-anchor="middle" font-size="10"   fill="var(--tg)" opacity=".7">threading.Thread · daemon</text>

<!-- ══════════════════════════════════════════
     LIFELINES
═══════════════════════════════════════════ -->
<line x1="125" y1="64"  x2="125" y2="832" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="330" y1="64"  x2="330" y2="832" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="545" y1="64"  x2="545" y2="832" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="760" y1="64"  x2="760" y2="832" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>

<!-- ══════════════════════════════════════════
     ① MOTION DETECTED (y=73–274)
═══════════════════════════════════════════ -->

<!-- Main: activation box (recording starting) -->
<rect x="119" y="106" width="12" height="163" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: motion detected -->
<rect x="50"  y="107" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="121" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">motion detected</text>
<text x="125" y="136" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">new_event_allowed() → True</text>

<!-- Arrow: Main → Watchdog  arm_watchdog() -->
<line x1="132" y1="160" x2="323" y2="160" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="155" text-anchor="middle" font-size="9.5" fill="var(--dim)">arm_watchdog()</text>

<!-- Watchdog note: Timer started -->
<rect x="255" y="164" width="150" height="38" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="178" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--wat)">Timer(MAX_RECORD_SEC)</text>
<text x="330" y="193" text-anchor="middle" font-size="9.5"  fill="var(--wat)" opacity=".8">120 s countdown begins</text>

<!-- Arrow: Main → Telegram  spawn daemon -->
<line x1="132" y1="222" x2="753" y2="222" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="443" y="217" text-anchor="middle" font-size="9.5" fill="var(--dim)">spawn daemon thread</text>

<!-- Telegram activation box -->
<rect x="754" y="225" width="12" height="43" fill="var(--tg-bg)" stroke="var(--tg)" stroke-width="1.5" rx="2"/>

<!-- Telegram note: send_photo -->
<rect x="685" y="228" width="150" height="38" rx="5" fill="var(--tg-bg)" stroke="var(--tg-bdr)" stroke-width="1"/>
<text x="760" y="242" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--tg)">send_photo(snapshot)</text>
<text x="760" y="257" text-anchor="middle" font-size="9.5"  fill="var(--tg)" opacity=".8">POST → Telegram Bot API</text>

<!-- ══════════════════════════════════════════
     ② WATCHDOG FIRES (y=287–474)
═══════════════════════════════════════════ -->

<!-- "time passes" annotation -->
<text x="125" y="308" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">⏱ frames…</text>

<!-- Watchdog activation box (firing) -->
<rect x="324" y="318" width="12" height="30" fill="var(--wat-bg)" stroke="var(--wat)" stroke-width="1.5" rx="2"/>

<!-- Watchdog note: fires -->
<rect x="255" y="318" width="150" height="38" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="332" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--wat)">MAX_RECORD_SEC elapsed</text>
<text x="330" y="347" text-anchor="middle" font-size="9.5"  fill="var(--wat)" opacity=".8">_split_event.set()</text>

<!-- Arrow: Watchdog → Main  _split_event signal -->
<line x1="323" y1="370" x2="132" y2="370" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="365" text-anchor="middle" font-size="9.5" fill="var(--dim)">_split_event signal</text>

<!-- Main activation box (handling split) -->
<rect x="119" y="374" width="12" height="84" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: split detected -->
<rect x="50"  y="374" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="388" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">_split_event.is_set()</text>
<text x="125" y="403" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">detected next get_frame()</text>

<!-- Arrow: Main → ffmpeg  split_recording -->
<line x1="132" y1="425" x2="538" y2="425" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="335" y="417" text-anchor="middle" font-size="9.5" fill="var(--dim)">split_recording(new_path,</text>
<text x="335" y="430" text-anchor="middle" font-size="9.5" fill="var(--dim)">on_complete=_upload_and_notify)</text>

<!-- Arrow: Main → Watchdog  re-arm -->
<line x1="132" y1="458" x2="323" y2="458" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="453" text-anchor="middle" font-size="9.5" fill="var(--dim)">arm_watchdog() — re-armed</text>

<!-- Watchdog note: restarted -->
<rect x="255" y="461" width="150" height="24" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="477" text-anchor="middle" font-size="9.5" fill="var(--wat)">new Timer(120s) starts</text>

<!-- ══════════════════════════════════════════
     ③ FFMPEG CONVERSION — OLD CLIP (y=487–644)
═══════════════════════════════════════════ -->

<!-- ffmpeg activation box -->
<rect x="539" y="497" width="12" height="145" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5" rx="2"/>

<!-- ffmpeg note: convert -->
<rect x="470" y="497" width="150" height="38" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="511" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">nice -n 10 ffmpeg</text>
<text x="545" y="526" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">-c:v copy  .h264 → .mp4</text>

<!-- ffmpeg note: log quality -->
<rect x="470" y="545" width="150" height="38" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="559" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">_log_clip_quality()</text>
<text x="545" y="574" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">ffprobe duration check</text>

<!-- ffmpeg note: upload + notify -->
<rect x="470" y="593" width="150" height="48" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="607" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">_upload_and_notify(path)</text>
<text x="545" y="621" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">dropbox_uploader.upload()</text>
<text x="545" y="635" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">telegram.send_message(url)</text>

<!-- ══════════════════════════════════════════
     ④ MOTION ENDS (y=657–832)
═══════════════════════════════════════════ -->

<!-- "time passes" on main -->
<text x="125" y="678" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">⏱ frames…</text>

<!-- Main activation box (finishing clip) -->
<rect x="119" y="689" width="12" height="75" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: motion ends -->
<rect x="50"  y="689" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="703" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">time_since_motion</text>
<text x="125" y="718" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">≥ POST_MOTION_BUFFER_SEC</text>

<!-- Arrow: Main → ffmpeg  stop_recording -->
<line x1="132" y1="743" x2="538" y2="743" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="335" y="736" text-anchor="middle" font-size="9.5" fill="var(--dim)">stop_recording(</text>
<text x="335" y="749" text-anchor="middle" font-size="9.5" fill="var(--dim)">on_complete=_upload_and_notify)</text>

<!-- ffmpeg activation box (new clip) -->
<rect x="539" y="757" width="12" height="72" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5" rx="2"/>

<!-- ffmpeg note: same flow -->
<rect x="470" y="757" width="150" height="70" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="771" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">same conversion flow</text>
<text x="545" y="786" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">nice -n 10 ffmpeg</text>
<text x="545" y="800" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">_log_clip_quality()</text>
<text x="545" y="814" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">_upload_and_notify(path)</text>

<!-- ══════════════════════════════════════════
     BOTTOM THREAD-ENDS
═══════════════════════════════════════════ -->
<circle cx="125" cy="832" r="5" fill="var(--main)"/>
<circle cx="330" cy="832" r="5" fill="var(--wat)"/>
<circle cx="545" cy="832" r="5" fill="var(--ffm)"/>
<circle cx="760" cy="832" r="5" fill="var(--tg)"/>

<!-- ══════════════════════════════════════════
     LEGEND
═══════════════════════════════════════════ -->
<text x="8" y="848" font-size="9" fill="var(--dim)">
  Activation box = thread doing work · Dashed line = thread idle · Arrow = spawns or signals
</text>

</svg>
</div>

</body>
</html>
