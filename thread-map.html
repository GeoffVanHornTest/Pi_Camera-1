<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Camera — Thread Map</title>
<style>
:root {
  --bg:#f6f8fa; --text:#24292f; --dim:#57606a; --surf:#fff; --bdr:#d0d7de;
  --main:#0969da; --main-bg:#ddf4ff; --main-bdr:#9ecbff;
  --wat:#9a6700;  --wat-bg:#fff8c5;  --wat-bdr:#f0c434;
  --ffm:#1a7f37;  --ffm-bg:#dafbe1;  --ffm-bdr:#56d364;
  --tg:#6639ba;   --tg-bg:#fbefff;   --tg-bdr:#bf8ff8;
  --sc:#4f6272;   --sc-bg:#eef1f4;   --sc-bdr:#b1c4d8;
  --ll:#d0d7de; --arr:#8c959f;
  --ph0:rgba(79,98,114,.07);
  --ph1:rgba(9,105,218,.05); --ph2:rgba(154,103,0,.05);
  --ph3:rgba(26,127,55,.05); --ph4:rgba(102,57,186,.05);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1117; --text:#e6edf3; --dim:#8b949e; --surf:#161b22; --bdr:#30363d;
  --main:#58a6ff; --main-bg:#0c1d3a; --main-bdr:#1f4e8c;
  --wat:#e3b341;  --wat-bg:#211a00;  --wat-bdr:#7a5500;
  --ffm:#56d364;  --ffm-bg:#0a1f0e;  --ffm-bdr:#1e5c2a;
  --tg:#d2a8ff;   --tg-bg:#1b0a3d;   --tg-bdr:#5e2fa0;
  --sc:#8ba0b0;   --sc-bg:#101c26;   --sc-bdr:#2a3f50;
  --ll:#21262d; --arr:#6e7681;
  --ph0:rgba(139,160,176,.07);
  --ph1:rgba(88,166,255,.07); --ph2:rgba(227,179,65,.07);
  --ph3:rgba(86,211,100,.07); --ph4:rgba(210,168,255,.07);
}}
:root[data-theme="light"]{
  --bg:#f6f8fa; --text:#24292f; --dim:#57606a; --surf:#fff; --bdr:#d0d7de;
  --main:#0969da; --main-bg:#ddf4ff; --main-bdr:#9ecbff;
  --wat:#9a6700;  --wat-bg:#fff8c5;  --wat-bdr:#f0c434;
  --ffm:#1a7f37;  --ffm-bg:#dafbe1;  --ffm-bdr:#56d364;
  --tg:#6639ba;   --tg-bg:#fbefff;   --tg-bdr:#bf8ff8;
  --sc:#4f6272;   --sc-bg:#eef1f4;   --sc-bdr:#b1c4d8;
  --ll:#d0d7de; --arr:#8c959f;
  --ph0:rgba(79,98,114,.07);
  --ph1:rgba(9,105,218,.05); --ph2:rgba(154,103,0,.05);
  --ph3:rgba(26,127,55,.05); --ph4:rgba(102,57,186,.05);
}
:root[data-theme="dark"]{
  --bg:#0d1117; --text:#e6edf3; --dim:#8b949e; --surf:#161b22; --bdr:#30363d;
  --main:#58a6ff; --main-bg:#0c1d3a; --main-bdr:#1f4e8c;
  --wat:#e3b341;  --wat-bg:#211a00;  --wat-bdr:#7a5500;
  --ffm:#56d364;  --ffm-bg:#0a1f0e;  --ffm-bdr:#1e5c2a;
  --tg:#d2a8ff;   --tg-bg:#1b0a3d;   --tg-bdr:#5e2fa0;
  --sc:#8ba0b0;   --sc-bg:#101c26;   --sc-bdr:#2a3f50;
  --ll:#21262d; --arr:#6e7681;
  --ph0:rgba(139,160,176,.07);
  --ph1:rgba(88,166,255,.07); --ph2:rgba(227,179,65,.07);
  --ph3:rgba(86,211,100,.07); --ph4:rgba(210,168,255,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:24px 16px 48px}
h1{font-size:1.05rem;font-weight:600;margin-bottom:3px}
.sub{font-size:.78rem;color:var(--dim);margin-bottom:18px}
.wrap{overflow-x:auto}
svg{display:block;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
</style>
</head>
<body>

<div class="hd">
  <h1>PI Camera — Thread Map</h1>
  <p class="sub">Detection pipeline and four concurrent threads across a recording lifecycle. "log:" annotations show event_log entries written in the main thread.</p>
</div>

<div class="wrap">
<svg viewBox="0 0 900 985" width="900" height="985" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 8 7" refX="7" refY="3.5"
          markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0 L8,3.5 L0,7 Z" fill="var(--arr)"/>
  </marker>
</defs>

<!-- ── Phase bands ── -->
<rect x="0"   y="73"  width="900" height="130" fill="var(--ph0)" rx="0"/>
<rect x="0"   y="213" width="900" height="202" fill="var(--ph1)" rx="0"/>
<rect x="0"   y="427" width="900" height="188" fill="var(--ph2)" rx="0"/>
<rect x="0"   y="627" width="900" height="158" fill="var(--ph3)" rx="0"/>
<rect x="0"   y="797" width="900" height="175" fill="var(--ph4)" rx="0"/>

<!-- ── Phase labels (left rail) ── -->
<text x="8" y="93"  font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--sc)"   opacity=".85">⓪ SCENE-CHANGE GATE</text>
<text x="8" y="233" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--main)" opacity=".75">① MOTION DETECTED</text>
<text x="8" y="447" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--wat)"  opacity=".75">② WATCHDOG FIRES</text>
<text x="8" y="647" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--ffm)"  opacity=".75">③ FFMPEG CONVERSION</text>
<text x="8" y="817" font-size="9.5" font-weight="600" letter-spacing=".06em" fill="var(--tg)"   opacity=".75">④ MOTION ENDS</text>

<!-- ══════════════════════════════════════════
     ACTOR HEADER BOXES
     cx: Main=125  Watchdog=330  ffmpeg=545  Telegram=760
═══════════════════════════════════════════ -->

<!-- Main Loop -->
<rect x="50"  y="10" width="150" height="54" rx="6" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5"/>
<text x="125" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--main)">Main Loop</text>
<text x="125" y="47" text-anchor="middle" font-size="10"   fill="var(--main)" opacity=".7">main thread · always running</text>

<!-- Watchdog Timer -->
<rect x="255" y="10" width="150" height="54" rx="6" fill="var(--wat-bg)" stroke="var(--wat)" stroke-width="1.5"/>
<text x="330" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--wat)">Watchdog Timer</text>
<text x="330" y="47" text-anchor="middle" font-size="10"   fill="var(--wat)" opacity=".7">threading.Timer · daemon</text>

<!-- ffmpeg Thread -->
<rect x="470" y="10" width="150" height="54" rx="6" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5"/>
<text x="545" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--ffm)">ffmpeg Thread</text>
<text x="545" y="47" text-anchor="middle" font-size="10"   fill="var(--ffm)" opacity=".7">threading.Thread · non-daemon</text>

<!-- Telegram Thread -->
<rect x="685" y="10" width="150" height="54" rx="6" fill="var(--tg-bg)" stroke="var(--tg)" stroke-width="1.5"/>
<text x="760" y="30" text-anchor="middle" font-size="12.5" font-weight="700" fill="var(--tg)">Telegram Thread</text>
<text x="760" y="47" text-anchor="middle" font-size="10"   fill="var(--tg)" opacity=".7">threading.Thread · daemon</text>

<!-- ══════════════════════════════════════════
     LIFELINES
═══════════════════════════════════════════ -->
<line x1="125" y1="64"  x2="125" y2="962" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="330" y1="64"  x2="330" y2="962" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="545" y1="64"  x2="545" y2="962" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>
<line x1="760" y1="64"  x2="760" y2="962" stroke="var(--ll)" stroke-width="1.5" stroke-dasharray="6 4"/>

<!-- ══════════════════════════════════════════
     ⓪ SCENE-CHANGE GATE (y=73–203) — Main thread only
     Runs every frame. Other threads idle throughout.
═══════════════════════════════════════════ -->

<!-- Main: activation box -->
<rect x="119" y="100" width="12" height="95" fill="var(--sc-bg)" stroke="var(--sc)" stroke-width="1.5" rx="2"/>

<!-- Main note: brightness computed + gate check -->
<rect x="50" y="100" width="150" height="38" rx="5" fill="var(--sc-bg)" stroke="var(--sc-bdr)" stroke-width="1"/>
<text x="125" y="114" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--sc)">brightness measured</text>
<text x="125" y="129" text-anchor="middle" font-size="9.5"  fill="var(--sc)" opacity=".8">cv2.cvtColor → grayscale mean</text>

<!-- Main note: gate fires, suppressed -->
<rect x="50" y="148" width="150" height="38" rx="5" fill="var(--sc-bg)" stroke="var(--sc-bdr)" stroke-width="1"/>
<text x="125" y="162" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--sc)">gate fires → suppressed</text>
<text x="125" y="177" text-anchor="middle" font-size="9.5"  fill="var(--sc)" opacity=".8">return False, frame</text>

<!-- log annotation -->
<text x="210" y="162" font-size="8.5" fill="var(--sc)" opacity=".65" font-style="italic">log: SCENE_CHANGE</text>

<!-- other threads idle note -->
<text x="443" y="148" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">other threads idle</text>
<text x="443" y="162" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">while gate suppresses</text>

<!-- ══════════════════════════════════════════
     ① MOTION DETECTED (y=213–414)
═══════════════════════════════════════════ -->

<!-- Main: activation box -->
<rect x="119" y="246" width="12" height="163" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: motion detected -->
<rect x="50"  y="247" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="261" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">motion detected</text>
<text x="125" y="276" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">new_event_allowed() → True</text>

<!-- log annotation -->
<text x="210" y="261" font-size="8.5" fill="var(--main)" opacity=".65" font-style="italic">log: MOTION</text>

<!-- Arrow: Main → Watchdog  arm_watchdog() -->
<line x1="132" y1="300" x2="323" y2="300" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="295" text-anchor="middle" font-size="9.5" fill="var(--dim)">arm_watchdog()</text>

<!-- Watchdog note: Timer started -->
<rect x="255" y="304" width="150" height="38" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="318" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--wat)">Timer(MAX_RECORD_SEC)</text>
<text x="330" y="333" text-anchor="middle" font-size="9.5"  fill="var(--wat)" opacity=".8">120 s countdown begins</text>

<!-- Arrow: Main → Telegram  spawn daemon thread -->
<line x1="132" y1="362" x2="753" y2="362" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="443" y="357" text-anchor="middle" font-size="9.5" fill="var(--dim)">spawn daemon thread</text>

<!-- Telegram activation box -->
<rect x="754" y="365" width="12" height="43" fill="var(--tg-bg)" stroke="var(--tg)" stroke-width="1.5" rx="2"/>

<!-- Telegram note: send_photo -->
<rect x="685" y="368" width="150" height="38" rx="5" fill="var(--tg-bg)" stroke="var(--tg-bdr)" stroke-width="1"/>
<text x="760" y="382" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--tg)">send_photo(snapshot)</text>
<text x="760" y="397" text-anchor="middle" font-size="9.5"  fill="var(--tg)" opacity=".8">POST → Telegram Bot API</text>

<!-- ══════════════════════════════════════════
     ② WATCHDOG FIRES (y=427–614)
═══════════════════════════════════════════ -->

<!-- "time passes" annotation -->
<text x="125" y="455" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">⏱ frames…</text>

<!-- Watchdog activation box (firing) -->
<rect x="324" y="458" width="12" height="30" fill="var(--wat-bg)" stroke="var(--wat)" stroke-width="1.5" rx="2"/>

<!-- Watchdog note: fires -->
<rect x="255" y="458" width="150" height="38" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="472" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--wat)">MAX_RECORD_SEC elapsed</text>
<text x="330" y="487" text-anchor="middle" font-size="9.5"  fill="var(--wat)" opacity=".8">_split_event.set()</text>

<!-- Arrow: Watchdog → Main  _split_event signal -->
<line x1="323" y1="510" x2="132" y2="510" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="505" text-anchor="middle" font-size="9.5" fill="var(--dim)">_split_event signal</text>

<!-- Main activation box (handling split) -->
<rect x="119" y="514" width="12" height="84" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: split detected -->
<rect x="50"  y="514" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="528" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">_split_event.is_set()</text>
<text x="125" y="543" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">detected next get_frame()</text>

<!-- log annotation -->
<text x="210" y="528" font-size="8.5" fill="var(--main)" opacity=".65" font-style="italic">log: SPLIT</text>

<!-- Arrow: Main → ffmpeg  split_recording -->
<line x1="132" y1="565" x2="538" y2="565" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="335" y="557" text-anchor="middle" font-size="9.5" fill="var(--dim)">split_recording(new_path,</text>
<text x="335" y="570" text-anchor="middle" font-size="9.5" fill="var(--dim)">on_complete=_upload_and_notify)</text>

<!-- Arrow: Main → Watchdog  re-arm -->
<line x1="132" y1="598" x2="323" y2="598" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="227" y="593" text-anchor="middle" font-size="9.5" fill="var(--dim)">arm_watchdog() — re-armed</text>

<!-- Watchdog note: restarted -->
<rect x="255" y="601" width="150" height="24" rx="5" fill="var(--wat-bg)" stroke="var(--wat-bdr)" stroke-width="1"/>
<text x="330" y="617" text-anchor="middle" font-size="9.5" fill="var(--wat)">new Timer(120 s) starts</text>

<!-- ══════════════════════════════════════════
     ③ FFMPEG CONVERSION — OLD CLIP (y=627–784)
     non-daemon: interpreter waits for on_complete()
═══════════════════════════════════════════ -->

<!-- ffmpeg activation box -->
<rect x="539" y="637" width="12" height="145" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5" rx="2"/>

<!-- ffmpeg note: convert -->
<rect x="470" y="637" width="150" height="38" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="651" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">nice -n 10 ffmpeg</text>
<text x="545" y="666" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">-c:v copy  .h264 → .mp4</text>

<!-- ffmpeg note: log quality -->
<rect x="470" y="685" width="150" height="38" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="699" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">_log_clip_quality()</text>
<text x="545" y="714" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">ffprobe duration check</text>

<!-- ffmpeg note: upload + notify -->
<rect x="470" y="733" width="150" height="48" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="747" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">_upload_and_notify(path)</text>
<text x="545" y="761" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">dropbox_uploader.upload()</text>
<text x="545" y="775" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">telegram.send_message(url)</text>

<!-- ══════════════════════════════════════════
     ④ MOTION ENDS (y=797–962)
═══════════════════════════════════════════ -->

<!-- "time passes" on main -->
<text x="125" y="825" text-anchor="middle" font-size="9" fill="var(--dim)" font-style="italic">⏱ frames…</text>

<!-- Main activation box (finishing clip) -->
<rect x="119" y="829" width="12" height="75" fill="var(--main-bg)" stroke="var(--main)" stroke-width="1.5" rx="2"/>

<!-- Main note: motion ends -->
<rect x="50"  y="829" width="150" height="38" rx="5" fill="var(--main-bg)" stroke="var(--main-bdr)" stroke-width="1"/>
<text x="125" y="843" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--main)">time_since_motion</text>
<text x="125" y="858" text-anchor="middle" font-size="9.5"  fill="var(--main)" opacity=".8">≥ POST_MOTION_BUFFER_SEC</text>

<!-- log annotation -->
<text x="210" y="843" font-size="8.5" fill="var(--main)" opacity=".65" font-style="italic">log: STOP</text>

<!-- Arrow: Main → ffmpeg  stop_recording -->
<line x1="132" y1="883" x2="538" y2="883" stroke="var(--arr)" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="335" y="876" text-anchor="middle" font-size="9.5" fill="var(--dim)">stop_recording(</text>
<text x="335" y="889" text-anchor="middle" font-size="9.5" fill="var(--dim)">on_complete=_upload_and_notify)</text>

<!-- ffmpeg activation box (final clip) -->
<rect x="539" y="897" width="12" height="62" fill="var(--ffm-bg)" stroke="var(--ffm)" stroke-width="1.5" rx="2"/>

<!-- ffmpeg note: same conversion flow -->
<rect x="470" y="897" width="150" height="60" rx="5" fill="var(--ffm-bg)" stroke="var(--ffm-bdr)" stroke-width="1"/>
<text x="545" y="911" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ffm)">same conversion flow</text>
<text x="545" y="926" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">nice -n 10 ffmpeg</text>
<text x="545" y="940" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">_log_clip_quality()</text>
<text x="545" y="954" text-anchor="middle" font-size="9.5"  fill="var(--ffm)" opacity=".8">_upload_and_notify(path)</text>

<!-- ══════════════════════════════════════════
     BOTTOM THREAD-ENDS
═══════════════════════════════════════════ -->
<circle cx="125" cy="962" r="5" fill="var(--main)"/>
<circle cx="330" cy="962" r="5" fill="var(--wat)"/>
<circle cx="545" cy="962" r="5" fill="var(--ffm)"/>
<circle cx="760" cy="962" r="5" fill="var(--tg)"/>

<!-- ══════════════════════════════════════════
     LEGEND
═══════════════════════════════════════════ -->
<text x="8" y="978" font-size="9" fill="var(--dim)">
  Activation box = thread doing work · Dashed line = thread idle · Arrow = spawns or signals · log: X = event_log entry written in main thread
</text>

</svg>
</div>

</body>
</html>
