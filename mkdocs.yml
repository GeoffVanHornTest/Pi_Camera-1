site_name: PI Camera
site_description: Raspberry Pi night vision motion camera with Telegram alerts and Dropbox upload
repo_url: https://github.com/GeoffVanHornTest/Pi_Camera-1
docs_dir: 04-docs

theme:
  name: material

nav:
  - Home: index.md
  - Motion Detection & Filtering: detection.md
  - Clip Timing & Ring Buffer: clip-timing.md
  - API Reference: api.md
  - Analysis Scripts: analysis.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [02-scripts]
